<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --color-red: #f14e3f;
      --color-red-dk: #c8311f;
      --color-teal: #215d72;
      --color-navy: #024460;
      --color-offwhite: #f7f8fa;
      --color-smoke: #eef0f3;
      --color-border: #dde1e6;
      --color-muted: #64748b;
      --color-dark: #0e1a24;
      --font-display: "DM Serif Display", Georgia, serif;
      --font-sans: "Inter", system-ui, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: #fff;
    }

    body {
      font-family: var(--font-sans);
      color: var(--color-dark);
      font-size: 14px;
    }

    h1,
    h2,
    h3 {
      font-family: var(--font-display);
    }

    .zwiz-wrap {
      padding: 0;
    }

    .zwiz-section-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--color-teal);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--color-smoke);
    }

    .zwiz-section-hint {
      font-size: 13px;
      color: var(--color-muted);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .field-hint {
      font-size: 11px;
      color: var(--color-muted);
      margin-top: 5px;
      line-height: 1.4;
    }

    /* ---- fields ---- */
    .flabel {
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .04em;
      display: block;
    }

    .req {
      color: var(--color-red);
    }

    .field {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--color-border);
      background: #fff;
      color: var(--color-dark);
      font-family: var(--font-sans);
      font-size: 14px;
      outline: 0;
      transition: border-color .2s, box-shadow .2s;
    }

    .field:focus {
      border-color: var(--color-teal);
      box-shadow: 0 0 0 3px rgba(33, 93, 114, .1);
    }

    textarea.field {
      resize: vertical;
      min-height: 110px;
      font-family: var(--font-sans);
    }

    .zgrid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .zfull {
      margin-bottom: 16px;
    }

    @media (max-width: 560px) {
      .zgrid2 {
        grid-template-columns: 1fr;
      }
    }

    /* ---- buttons / nav ---- */
    .zwiz-nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--color-smoke);
    }

    .btn-primary {
      background: var(--color-red);
      color: #fff;
      border: none;
      padding: 13px 28px;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background .2s, transform .15s;
    }

    .btn-primary:hover {
      background: var(--color-red-dk);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }

    /* ---- toast ---- */
    #rsToastStack {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 320px;
      pointer-events: none;
    }

    .rs-toast {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fff;
      border: 1px solid var(--color-border);
      border-left: 4px solid var(--color-red);
      box-shadow: 0 10px 30px rgba(2, 68, 96, .16);
      padding: 13px 14px;
      font-family: var(--font-sans);
      opacity: 0;
      transform: translateX(16px);
      transition: opacity .25s ease, transform .25s ease;
      pointer-events: auto;
    }

    .rs-toast.show {
      opacity: 1;
      transform: translateX(0);
    }

    .rs-toast-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      fill: var(--color-red);
      margin-top: 1px;
    }

    .rs-toast-text {
      font-size: 13px;
      line-height: 1.5;
      color: var(--color-dark);
    }

    .rs-toast-title {
      font-weight: 700;
      font-size: 12.5px;
      color: var(--color-red-dk);
      display: block;
      margin-bottom: 2px;
    }
  </style>
</head>

  <script>
    // Report content height to the parent page so the embedding iframe can auto-resize.
    function zSendHeight() {
      var height = document.body.scrollHeight;
      window.parent.postMessage({ type: 'zohoHelpFormHeight', height: height }, '*');
    }
    window.addEventListener('load', zSendHeight);
    window.addEventListener('resize', zSendHeight);
    setTimeout(zSendHeight, 300);

    function showRsToast(title, message) {
      var stack = document.getElementById('rsToastStack');
      if (!stack) return;
      var toast = document.createElement('div');
      toast.className = 'rs-toast';
      toast.innerHTML =
        '<svg class="rs-toast-icon" viewBox="0 0 24 24"><path d="M12 2 1 21h22L12 2zm0 6.5 6.6 11H5.4L12 8.5zM11 11v4h2v-4h-2zm0 5.5v2h2v-2h-2z"/></svg>' +
        '<div class="rs-toast-text"><span class="rs-toast-title">' + title + '</span>' + message + '</div>';
      stack.appendChild(toast);
      requestAnimationFrame(function () { toast.classList.add('show'); });
      setTimeout(function () {
        toast.classList.remove('show');
        setTimeout(function () { toast.remove(); zSendHeight(); }, 250);
      }, 6000);
      zSendHeight();
    }
  </script>
